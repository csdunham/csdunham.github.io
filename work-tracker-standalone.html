<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work Tracker</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff;
    --bg2: #f5f5f3;
    --bg3: #ededea;
    --text: #1a1a1a;
    --text2: #6b6b6b;
    --text3: #999;
    --border: rgba(0,0,0,0.12);
    --border2: rgba(0,0,0,0.2);
    --blue: #4a9ede;
    --radius: 8px;
    --radius-lg: 12px;
    --modal-overlay: rgba(0,0,0,0.35);
    --btn-hover-bg: #d0d0ce;
    --btn-hover-color: #1a1a1a;
    --btn-primary-hover-bg: #404040;
    --lane-active: #0F6E56;
    --lane-waiting: #854F0B;
    --lane-someday: #3C3489;
    --lane-done: #5F5E5A;
  }
  [data-dark] {
    --bg: #1e1e1e;
    --bg2: #141414;
    --bg3: #2a2a2a;
    --text: #e8e8e8;
    --text2: #9a9a9a;
    --text3: #666;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.16);
    --blue: #4a9ede;
    --modal-overlay: rgba(0,0,0,0.6);
    --btn-hover-bg: #555;
    --btn-hover-color: #e8e8e8;
    --btn-primary-hover-bg: #bbb;
    --lane-active: #2DC898;
    --lane-waiting: #F0A030;
    --lane-someday: #9B8FEE;
    --lane-done: #9A9A9A;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg2); color: var(--text); min-height: 100vh; transition: background 0.2s, color 0.2s; }

  /* ── Top bar ── */
  .topbar { background: var(--bg); border-bottom: 0.5px solid var(--border); padding: 0 1.5rem; height: 52px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .topbar-left { display: flex; align-items: center; gap: 16px; }
  .topbar-title-wrap { display: flex; align-items: center; gap: 6px; }
  .topbar-title { font-size: 18px; font-weight: 500; white-space: nowrap; }
  .topbar-rename-btn { background: none; border: none; cursor: pointer; padding: 2px; color: var(--text3); display: flex; align-items: center; opacity: 0.6; }
  .topbar-rename-btn:hover { opacity: 1; color: var(--text2); }
  .topbar-note { font-size: 12px; color: var(--text3); font-style: italic; }
  .toggle-wrap { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--text2); cursor: pointer; user-select: none; white-space: nowrap; }
  .toggle { position: relative; width: 32px; height: 18px; flex-shrink: 0; }
  .toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
  .toggle-track { position: absolute; inset: 0; background: var(--border2); border-radius: 9px; transition: background 0.2s; }
  .toggle input:checked + .toggle-track { background: var(--blue); }
  .toggle-thumb { position: absolute; top: 2px; left: 2px; width: 14px; height: 14px; background: white; border-radius: 50%; transition: transform 0.2s; pointer-events: none; }
  .toggle input:checked ~ .toggle-thumb { transform: translateX(14px); }
  .main { padding: 1.5rem; max-width: 1200px; margin: 0 auto; }

  /* ── Buttons ── */
  .btn { background: transparent; border: 0.5px solid var(--border2); border-radius: var(--radius); padding: 6px 12px; font-size: 13px; cursor: pointer; color: var(--text); display: inline-flex; align-items: center; gap: 6px; }
  .btn:hover { background: var(--btn-hover-bg); color: var(--btn-hover-color); }
  .btn-primary { background: var(--text); color: var(--bg); border-color: transparent; }
  .btn-primary:hover { background: var(--btn-primary-hover-bg); color: var(--bg); opacity: 1; }
  .btn-sm { padding: 4px 8px; font-size: 12px; }
  .btn-danger { color: #A32D2D; border-color: #F09595; background: transparent; }
  .btn-danger:hover { background: #FCEBEB; }

  /* ── Kanban ── */
  .view-header { display: flex; align-items: center; gap: 12px; margin-bottom: 1.25rem; flex-wrap: wrap; }
  .view-header h2 { font-size: 18px; font-weight: 500; }
  .breadcrumb { font-size: 16px; display: flex; align-items: center; gap: 6px; }
  .breadcrumb-link { cursor: pointer; color: var(--blue); }
  .breadcrumb-link:hover { text-decoration: underline; }
  .breadcrumb-sep { color: var(--text3); }
  .breadcrumb-current { color: var(--text); font-weight: 500; cursor: default; }
  .commitment-detail { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 14px 16px; margin-bottom: 1.25rem; }
  .commitment-detail-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  .commitment-detail-title { font-size: 16px; font-weight: 500; margin-bottom: 4px; }
  .commitment-detail-notes { font-size: 13px; color: var(--text2); margin-bottom: 8px; }
  .kanban { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; align-items: start; }
  .lane { background: var(--bg3); border-radius: var(--radius-lg); padding: 10px; transition: background 0.15s; }
  .lane.drag-over { background: #E6F1FB; outline: 1.5px dashed #378ADD; }
  .lane-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .lane-title { font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; }
  .lane-count { font-size: 11px; color: var(--text3); }
  .lane[data-lane="Active"] .lane-title { color: var(--lane-active); }
  .lane[data-lane="Waiting On"] .lane-title { color: var(--lane-waiting); }
  .lane[data-lane="Someday"] .lane-title { color: var(--lane-someday); }
  .lane[data-lane="Done"] .lane-title { color: var(--lane-done); }
  .cards-area { min-height: 40px; }
  .card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 10px 12px 10px 12px; margin-bottom: 6px; user-select: none; transition: opacity 0.15s; position: relative; cursor: pointer; display: flex; align-items: flex-start; gap: 8px; }
  .card.dragging { opacity: 0.4; }
  .card.drag-insert-above { border-top: 2px solid #378ADD; }
  .card.drag-insert-below { border-bottom: 2px solid #378ADD; }
  .card:hover { border-color: var(--border2); }
  .card-body { flex: 1; min-width: 0; }
  .drag-handle { flex-shrink: 0; display: flex; align-items: center; padding: 2px 0 2px 4px; cursor: grab; color: var(--text3); opacity: 0.5; align-self: center; }
  .drag-handle:hover { opacity: 1; color: var(--text2); }
  .drag-handle:active { cursor: grabbing; }
  .card-title { font-size: 13px; font-weight: 500; margin-bottom: 4px; }
  .card-meta { font-size: 11px; color: var(--text2); display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .badge { display: inline-block; padding: 2px 7px; border-radius: 20px; font-size: 10px; font-weight: 500; }
  .badge-Active { background: #E1F5EE; color: #0F6E56; }
  .badge-WaitingOn { background: #FAEEDA; color: #854F0B; }
  .badge-Someday { background: #EEEDFE; color: #3C3489; }
  .badge-Done { background: #F1EFE8; color: #5F5E5A; }
  .task-count { font-size: 11px; color: var(--text3); }
  .completed-date { font-size: 11px; color: var(--text3); }
  .empty { font-size: 12px; color: var(--text3); text-align: center; padding: 16px 0; }

  /* ── Modal ── */
  .modal-bg { position: fixed; inset: 0; background: var(--modal-overlay); display: flex; align-items: flex-start; justify-content: center; padding-top: 80px; z-index: 100; }
  .modal { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; width: 100%; max-width: 420px; }
  .modal h3 { font-size: 16px; font-weight: 500; margin-bottom: 1rem; }
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 4px; }
  .field input, .field select, .field textarea { width: 100%; font-size: 13px; padding: 7px 10px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--bg); color: var(--text); font-family: inherit; }
  .field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px rgba(24,95,165,0.1); }
  .field textarea { resize: vertical; min-height: 60px; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 1rem; }

  /* ── Today mode ── */
  .today-banner { font-size: 12px; color: var(--text3); margin-bottom: 1rem; font-style: italic; }
  .today-kanban { display: grid; grid-template-columns: minmax(0, 480px); gap: 10px; }

  @media (max-width: 640px) { .kanban { grid-template-columns: 1fr 1fr; } }
  @media (max-width: 400px) { .kanban { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-title-wrap">
      <span class="topbar-title" id="topbar-title-text">Work Tracker</span>
      <button class="topbar-rename-btn" onclick="openRenameDialog()" title="Rename">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
          <path d="M11.013 1.427a1.75 1.75 0 0 1 2.474 0l1.086 1.086a1.75 1.75 0 0 1 0 2.474l-8.61 8.61c-.21.21-.47.364-.756.445l-3.251.93a.75.75 0 0 1-.927-.928l.929-3.25c.081-.286.235-.547.445-.758l8.61-8.61zm1.414 1.06a.25.25 0 0 0-.354 0L10.811 3.75l1.439 1.44 1.263-1.263a.25.25 0 0 0 0-.354l-1.086-1.086zM11.189 6.25 9.75 4.81 3.22 11.34a.25.25 0 0 0-.064.108l-.558 1.953 1.953-.558a.25.25 0 0 0 .108-.064L11.19 6.25z"/>
        </svg>
      </button>
    </div>
    <span class="topbar-note">Standalone mode — data saved in this browser</span>
  </div>
  <div style="display:flex;align-items:center;gap:16px;">
    <label class="toggle-wrap">
      <span>Today</span>
      <span class="toggle">
        <input type="checkbox" id="today-toggle" onchange="renderApp()">
        <span class="toggle-track"></span>
        <span class="toggle-thumb"></span>
      </span>
    </label>
    <label class="toggle-wrap">
      <span>Dark mode</span>
      <span class="toggle">
        <input type="checkbox" id="dark-mode-toggle" onchange="toggleDark(this.checked)">
        <span class="toggle-track"></span>
        <span class="toggle-thumb"></span>
      </span>
    </label>
    <label class="toggle-wrap">
      <span>Hide old done items</span>
      <span class="toggle">
        <input type="checkbox" id="hide-old-toggle" onchange="renderApp()">
        <span class="toggle-track"></span>
        <span class="toggle-thumb"></span>
      </span>
    </label>
  </div>
</div>
<div class="main">
  <div id="kanban-root"></div>
</div>
<div id="modal-container"></div>
<div id="debug-bar" style="display:none;position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:0.5px solid var(--border);padding:8px 1.5rem;display:none;align-items:center;gap:12px;z-index:50;">
  <span style="font-size:11px;color:var(--text3);font-family:monospace;">debug</span>
  <button class="btn btn-sm" onclick="debugDownload()">Download JSON</button>
  <button class="btn btn-sm" onclick="document.getElementById('debug-upload-input').click()">Upload JSON</button>
  <input type="file" id="debug-upload-input" accept=".json,application/json" style="display:none" onchange="debugUpload(this)">
</div>

<script>
const STORAGE_KEY = 'work_tracker_data';
const LANES = ['Active', 'Waiting On', 'Someday', 'Done'];
const BADGE_KEY = { 'Active': 'Active', 'Waiting On': 'WaitingOn', 'Someday': 'Someday', 'Done': 'Done' };
const OLD_DONE_DAYS = 7;

let appState = { view: 'commitments', commitmentId: null, commitments: [], tasks: [], title: 'Work Tracker' };
let modalState = null;
let dragState = null;
let didDrag = false;

// ── Persistence ───────────────────────────────────────────────────────────────

function save() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ commitments: appState.commitments, tasks: appState.tasks, title: appState.title }));
  } catch(e) { console.warn('Could not save:', e); }
}

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) { const d = JSON.parse(raw); appState.commitments = d.commitments || []; appState.tasks = d.tasks || []; appState.title = d.title || 'Work Tracker'; }
  } catch(e) { appState.commitments = []; appState.tasks = []; appState.title = 'Work Tracker'; }
}

function renderTitle() {
  const el = document.getElementById('topbar-title-text');
  if (el) el.textContent = appState.title;
  document.title = appState.title;
}

function openRenameDialog() {
  const current = appState.title;
  const el = document.getElementById('modal-container');
  el.innerHTML = `<div class="modal-bg" onclick="if(event.target===this)closeRenameDialog()">
    <div class="modal" id="rename-modal">
      <h3>Rename</h3>
      <div class="field"><label>Title</label><input id="rename-input" value="${esc(current)}" maxlength="80"></div>
      <div class="modal-actions">
        <button class="btn btn-sm" onclick="closeRenameDialog()">Cancel</button>
        <button class="btn btn-sm btn-primary" onclick="saveRename()">Save</button>
      </div>
    </div>
  </div>`;
  const input = document.getElementById('rename-input');
  input.focus();
  input.select();
  document.getElementById('rename-modal').addEventListener('keydown', e => {
    if (e.key === 'Escape') { e.preventDefault(); closeRenameDialog(); }
    if (e.key === 'Enter') { e.preventDefault(); saveRename(); }
  });
}

function closeRenameDialog() {
  document.getElementById('modal-container').innerHTML = '';
}

function saveRename() {
  const val = document.getElementById('rename-input').value.trim();
  if (!val) return;
  appState.title = val;
  renderTitle();
  save();
  closeRenameDialog();
}

// ── Helpers ───────────────────────────────────────────────────────────────────

function uid() { return 'id' + Math.random().toString(36).slice(2); }
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function badgeHTML(lane) { return `<span class="badge badge-${BADGE_KEY[lane]||'Done'}">${lane}</span>`; }
function tasksFor(cid) { return appState.tasks.filter(t => t.commitmentId === cid); }
function today() { return new Date().toISOString().slice(0,10); }

function isOldDone(item) {
  if (item.lane !== 'Done' || !item.completedDate) return false;
  return (Date.now() - new Date(item.completedDate).getTime()) > OLD_DONE_DAYS * 86400000;
}

function hideOldEnabled() { return document.getElementById('hide-old-toggle')?.checked; }
function todayEnabled() { return document.getElementById('today-toggle')?.checked; }
function shouldShow(item) { return !hideOldEnabled() || !isOldDone(item); }

function laneItems(items, lane) {
  const inLane = items.filter(i => i.lane === lane);
  if (lane === 'Done') {
    return inLane.sort((a, b) => {
      if (!a.completedDate && !b.completedDate) return (a.sortOrder||0) - (b.sortOrder||0);
      if (!a.completedDate) return 1;
      if (!b.completedDate) return -1;
      return new Date(b.completedDate) - new Date(a.completedDate);
    });
  }
  return inLane.sort((a, b) => (a.sortOrder||0) - (b.sortOrder||0));
}

function commitmentProgress(cid) {
  const ts = tasksFor(cid);
  if (!ts.length) return 'no tasks';
  return `${ts.filter(t => t.lane==='Done').length}/${ts.length} done`;
}

function formatDate(d) {
  if (!d) return '';
  return new Date(d + 'T00:00:00').toLocaleDateString(undefined, { month:'short', day:'numeric', year:'numeric' });
}

function normalizeSortOrders() {
  LANES.forEach(lane => {
    [appState.commitments, appState.tasks].forEach(col => {
      col.filter(i => i.lane === lane)
         .sort((a,b) => (a.sortOrder||0) - (b.sortOrder||0))
         .forEach((item, idx) => { item.sortOrder = (idx+1)*1000; });
    });
  });
}

// ── Render ────────────────────────────────────────────────────────────────────

const TODAY_LIMIT = 3;

function renderKanban(items, cardFn) {
  if (todayEnabled()) {
    const activeItems = laneItems(items, 'Active');
    const top = activeItems.slice(0, TODAY_LIMIT);
    const remaining = activeItems.length - top.length;
    const cards = top.map(i => cardFn(i)).join('') || '<div class="empty">—</div>';
    const moreNote = remaining > 0 ? `<div class="empty" style="font-style:italic">+${remaining} more item${remaining>1?'s':''}</div>` : '';
    return `<div class="today-kanban">
      <div class="lane" data-lane="Active">
        <div class="lane-header"><span class="lane-title">Active</span><span class="lane-count">${activeItems.length}</span></div>
        <div class="cards-area" data-lane="Active">${cards}${moreNote}</div>
      </div>
    </div>`;
  }
  return `<div class="kanban">${LANES.map(lane => {
    const its = laneItems(items, lane);
    const visible = its.filter(shouldShow);
    const hidden = its.length - visible.length;
    const cards = visible.map(i => cardFn(i)).join('');
    const hiddenNote = hidden > 0 ? `<div class="empty" style="font-style:italic">${hidden} older item${hidden>1?'s':''} hidden</div>` : '';
    return `<div class="lane" data-lane="${lane}">
      <div class="lane-header"><span class="lane-title">${lane}</span><span class="lane-count">${its.length}</span></div>
      <div class="cards-area" data-lane="${lane}">
        ${cards || (!hiddenNote ? '<div class="empty">—</div>' : '')}
        ${hiddenNote}
      </div>
    </div>`;
  }).join('')}</div>`;
}

const DRAG_HANDLE_SVG = `<svg width="12" height="16" viewBox="0 0 12 16" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
  <circle cx="3.5" cy="3" r="1.5"/><circle cx="8.5" cy="3" r="1.5"/>
  <circle cx="3.5" cy="8" r="1.5"/><circle cx="8.5" cy="8" r="1.5"/>
  <circle cx="3.5" cy="13" r="1.5"/><circle cx="8.5" cy="13" r="1.5"/>
</svg>`;

function commitmentCard(c) {
  const dateStr = c.completedDate ? `<span class="completed-date">Done ${formatDate(c.completedDate)}</span>` : '';
  return `<div class="card" draggable="true" data-id="${c.id}" data-type="commitment">
    <div class="card-body">
      <div class="card-title">${esc(c.title)}</div>
      <div class="card-meta">${badgeHTML(c.lane)}<span class="task-count">${commitmentProgress(c.id)}</span>${dateStr}</div>
    </div>
    <div class="drag-handle" title="Drag to reorder">${DRAG_HANDLE_SVG}</div>
  </div>`;
}

function taskCard(t) {
  const dateStr = t.completedDate ? `<span class="completed-date">Done ${formatDate(t.completedDate)}</span>` : '';
  return `<div class="card" draggable="true" data-id="${t.id}" data-type="task">
    <div class="card-body">
      <div class="card-title">${esc(t.title)}</div>
      <div class="card-meta">${badgeHTML(t.lane)}${dateStr}</div>
    </div>
    <div class="drag-handle" title="Drag to reorder">${DRAG_HANDLE_SVG}</div>
  </div>`;
}

function renderApp() {
  let content = '';
  if (appState.view === 'tasks') {
    const c = appState.commitments.find(x => x.id === appState.commitmentId);
    if (!c) { appState.view = 'commitments'; renderApp(); return; }
    content = `
      <div class="view-header">
        <div class="breadcrumb">
          <span class="breadcrumb-link" onclick="goHome()">Commitments</span>
          <span class="breadcrumb-sep">›</span>
          <span class="breadcrumb-current">${esc(c.title)}</span>
        </div>
        <button class="btn btn-sm btn-primary" onclick="openModal('task',null)">+ New task</button>
      </div>
      <div class="commitment-detail">
        <div class="commitment-detail-top">
          <div>
            <div class="commitment-detail-title">${esc(c.title)}</div>
            ${c.notes ? `<div class="commitment-detail-notes">${esc(c.notes)}</div>` : ''}
            ${badgeHTML(c.lane)}
          </div>
          <button class="btn btn-sm" onclick="openModal('commitment','${c.id}')">Edit</button>
        </div>
      </div>
      ${renderKanban(tasksFor(c.id), taskCard)}`;
  } else {
    content = `
      <div class="view-header">
        <h2>Commitments</h2>
        <button class="btn btn-sm btn-primary" onclick="openModal('commitment',null)">+ New commitment</button>
      </div>
      ${renderKanban(appState.commitments, commitmentCard)}`;
  }
  document.getElementById('kanban-root').innerHTML = content;
  setupDrag();
  renderModal();
}

// ── Modal ─────────────────────────────────────────────────────────────────────

function openModal(type, editId) { modalState = { type, editId }; renderModal(); }
function closeModal() { modalState = null; renderModal(); }

function renderModal() {
  const el = document.getElementById('modal-container');
  if (!modalState) { el.innerHTML = ''; return; }
  const { type, editId } = modalState;
  const isTask = type === 'task';
  const item = editId ? (isTask ? appState.tasks.find(t => t.id===editId) : appState.commitments.find(c => c.id===editId)) : null;
  const title = item ? (isTask ? 'Edit task' : 'Edit commitment') : (isTask ? 'New task' : 'New commitment');
  const laneOpts = LANES.map(l => `<option value="${l}"${item&&item.lane===l?' selected':''}>${l}</option>`).join('');
  const commitmentOpts = appState.commitments.map(c =>
    `<option value="${c.id}"${(item&&item.commitmentId===c.id)||(appState.commitmentId===c.id&&!item)?' selected':''}>${esc(c.title)}</option>`
  ).join('');
  const noteField = !isTask ? `<div class="field"><label>Notes</label><textarea id="f-notes">${esc(item&&item.notes||'')}</textarea></div>` : '';
  const commitmentField = isTask ? `<div class="field"><label>Commitment</label><select id="f-commitment">${commitmentOpts}</select></div>` : '';
  const deleteBtn = item ? `<button class="btn btn-sm btn-danger" onclick="deleteItem('${editId}','${type}')">Delete</button>` : '';

  el.innerHTML = `<div class="modal-bg" onclick="if(event.target===this)closeModal()">
    <div class="modal" id="the-modal">
      <h3>${title}</h3>
      <div class="field"><label>Title</label><input id="f-title" value="${esc(item&&item.title||'')}"></div>
      ${commitmentField}${noteField}
      <div class="field"><label>Status</label><select id="f-lane">${laneOpts}</select></div>
      <div class="modal-actions">
        ${deleteBtn}
        <button class="btn btn-sm" onclick="closeModal()">Cancel</button>
        <button class="btn btn-sm btn-primary" onclick="saveItem('${type}','${editId||''}')">Save</button>
      </div>
    </div>
  </div>`;

  document.getElementById('f-title').focus();
  document.getElementById('the-modal').addEventListener('keydown', e => {
    if (e.key === 'Escape') { e.preventDefault(); closeModal(); }
    if (e.key === 'Enter' && e.target.tagName !== 'TEXTAREA') { e.preventDefault(); saveItem(type, editId||''); }
  });
}

function saveItem(type, editId) {
  const titleEl = document.getElementById('f-title');
  const title = titleEl.value.trim();
  if (!title) { titleEl.focus(); return; }
  const newLane = document.getElementById('f-lane').value;

  if (type === 'commitment') {
    const notes = document.getElementById('f-notes').value.trim();
    if (editId) {
      const c = appState.commitments.find(x => x.id===editId);
      if (c) {
        if (newLane==='Done' && c.lane!=='Done') c.completedDate = today();
        else if (newLane!=='Done' && c.lane==='Done') c.completedDate = null;
        c.title = title; c.notes = notes; c.lane = newLane;
      }
    } else {
      const maxOrder = Math.max(0, ...appState.commitments.filter(x=>x.lane===newLane).map(x=>x.sortOrder||0));
      appState.commitments.push({ id:uid(), title, lane:newLane, notes, sortOrder:maxOrder+1000, completedDate:newLane==='Done'?today():null });
    }
  } else {
    const commitmentId = document.getElementById('f-commitment').value;
    if (editId) {
      const t = appState.tasks.find(x => x.id===editId);
      if (t) {
        if (newLane==='Done' && t.lane!=='Done') t.completedDate = today();
        else if (newLane!=='Done' && t.lane==='Done') t.completedDate = null;
        t.title = title; t.lane = newLane; t.commitmentId = commitmentId;
      }
    } else {
      const maxOrder = Math.max(0, ...appState.tasks.filter(x=>x.lane===newLane&&x.commitmentId===commitmentId).map(x=>x.sortOrder||0));
      appState.tasks.push({ id:uid(), commitmentId, title, lane:newLane, sortOrder:maxOrder+1000, completedDate:newLane==='Done'?today():null });
    }
  }
  save(); closeModal(); renderApp();
}

function deleteItem(id, type) {
  if (type==='commitment') {
    appState.commitments = appState.commitments.filter(c=>c.id!==id);
    appState.tasks = appState.tasks.filter(t=>t.commitmentId!==id);
    appState.view='commitments'; appState.commitmentId=null;
  } else {
    appState.tasks = appState.tasks.filter(t=>t.id!==id);
  }
  save(); closeModal(); renderApp();
}

function goHome() { appState.view='commitments'; appState.commitmentId=null; renderApp(); }

// ── Drag & Drop ───────────────────────────────────────────────────────────────

let dragFromHandle = false;

function clearInsertIndicators() {
  document.querySelectorAll('.card').forEach(c => c.classList.remove('drag-insert-above','drag-insert-below'));
}

function clearDragState() {
  document.querySelectorAll('.card.dragging').forEach(c => c.classList.remove('dragging'));
  document.querySelectorAll('.lane').forEach(l => l.classList.remove('drag-over'));
  clearInsertIndicators();
  dragState = null;
  dragFromHandle = false;
  didDrag = false;
}

document.addEventListener('dragend', () => { clearDragState(); });

function setupDrag() {
  document.querySelectorAll('.card[draggable]').forEach(card => {
    // Only allow drag to start when initiated from the handle
    const handle = card.querySelector('.drag-handle');
    if (handle) {
      handle.addEventListener('mousedown', () => { dragFromHandle = true; });
    }

    card.addEventListener('dragstart', e => {
      if (!dragFromHandle) { e.preventDefault(); return; }
      didDrag = false;
      dragState = { id: card.dataset.id, type: card.dataset.type };
      setTimeout(() => card.classList.add('dragging'), 0);
      e.dataTransfer.effectAllowed = 'move';
      dragFromHandle = false;
    });

    card.addEventListener('dragend', () => { clearDragState(); });

    card.addEventListener('dragover', e => {
      e.preventDefault(); e.stopPropagation();
      if (!dragState) return;
      clearInsertIndicators();
      const rect = card.getBoundingClientRect();
      if (e.clientY < rect.top + rect.height / 2) card.classList.add('drag-insert-above');
      else card.classList.add('drag-insert-below');
    });

    card.addEventListener('drop', e => {
      e.preventDefault(); e.stopPropagation();
      if (!dragState || dragState.id === card.dataset.id) { clearDragState(); return; }
      didDrag = true;
      const insertAbove = card.classList.contains('drag-insert-above');
      const savedDragState = { ...dragState };
      clearDragState();

      const collection = savedDragState.type==='commitment' ? appState.commitments : appState.tasks;
      const dragged = collection.find(x => x.id===savedDragState.id);
      const target = collection.find(x => x.id===card.dataset.id);
      if (!dragged || !target) return;

      const targetLane = target.lane;
      if (dragged.lane !== targetLane) {
        if (targetLane==='Done') dragged.completedDate = today();
        else if (dragged.lane==='Done') dragged.completedDate = null;
        dragged.lane = targetLane;
      }

      const lanePeers = laneItems(collection, targetLane);
      const idx = lanePeers.findIndex(x => x.id===target.id);
      const targetOrder = target.sortOrder || 0;
      if (insertAbove) {
        const prev = lanePeers[idx-1];
        dragged.sortOrder = prev ? ((prev.sortOrder||0) + targetOrder) / 2 : targetOrder - 500;
      } else {
        const next = lanePeers[idx+1];
        dragged.sortOrder = next ? (targetOrder + (next.sortOrder||0)) / 2 : targetOrder + 500;
      }
      save(); renderApp();
    });

    card.addEventListener('click', e => {
      if (didDrag) return;
      // Clicks on the handle don't navigate/open
      if (e.target.closest('.drag-handle')) return;
      if (card.dataset.type==='commitment') { appState.view='tasks'; appState.commitmentId=card.dataset.id; renderApp(); }
      else openModal('task', card.dataset.id);
    });
  });

  document.querySelectorAll('.cards-area').forEach(area => {
    const lane = area.closest('.lane');
    area.addEventListener('dragover', e => {
      e.preventDefault(); e.dataTransfer.dropEffect='move';
      document.querySelectorAll('.lane').forEach(l => l.classList.remove('drag-over'));
      lane.classList.add('drag-over');
    });
    area.addEventListener('dragleave', e => {
      if (!area.contains(e.relatedTarget)) lane.classList.remove('drag-over');
    });
    area.addEventListener('drop', e => {
      e.preventDefault();
      if (!dragState) return;
      if (e.target !== area && e.target.closest && e.target.closest('.card')) return;
      didDrag = true;

      const newLane = area.dataset.lane;
      const savedDragState = { ...dragState };
      clearDragState();

      const collection = savedDragState.type==='commitment' ? appState.commitments : appState.tasks;
      const item = collection.find(x => x.id===savedDragState.id);
      if (!item) return;
      if (item.lane !== newLane) {
        if (newLane==='Done') item.completedDate = today();
        else if (item.lane==='Done') item.completedDate = null;
        item.lane = newLane;
      }
      const maxOrder = Math.max(0, ...laneItems(collection, newLane).map(x => x.sortOrder||0));
      item.sortOrder = maxOrder + 1000;
      save(); renderApp();
    });
  });
}

// ── Debug mode ────────────────────────────────────────────────────────────────

function debugDownload() {
  const raw = localStorage.getItem(STORAGE_KEY) || '{"commitments":[],"tasks":[]}';
  const blob = new Blob([JSON.stringify(JSON.parse(raw), null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `work-tracker-${today()}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
}

function debugUpload(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!Array.isArray(data.commitments) || !Array.isArray(data.tasks)) throw new Error('Invalid structure');
      appState.commitments = data.commitments;
      appState.tasks = data.tasks;
      if (data.title) appState.title = data.title;
      normalizeSortOrders();
      save();
      renderTitle();
      renderApp();
      input.value = '';
    } catch(err) {
      alert('Upload failed: ' + err.message);
    }
  };
  reader.readAsText(file);
}

// ── Boot ──────────────────────────────────────────────────────────────────────

function toggleDark(on) {
  if (on) document.documentElement.setAttribute('data-dark', '');
  else document.documentElement.removeAttribute('data-dark');
  try { localStorage.setItem('wt_dark', on ? '1' : '0'); } catch(e) {}
}

load();
normalizeSortOrders();
save();
renderTitle();

// Restore dark mode preference before first render
try {
  if (localStorage.getItem('wt_dark') === '1') {
    document.documentElement.setAttribute('data-dark', '');
    document.getElementById('dark-mode-toggle').checked = true;
  }
} catch(e) {}

// Show debug bar if ?debug=1 in URL
if (new URLSearchParams(window.location.search).get('debug') === '1') {
  document.getElementById('debug-bar').style.display = 'flex';
  document.querySelector('.main').style.paddingBottom = '3rem';
}

renderApp();
</script>
