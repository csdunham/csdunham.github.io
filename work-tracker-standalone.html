<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Work Tracker</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #ffffff; --bg2: #f5f5f3; --bg3: #ededea;
  --text: #1a1a1a; --text2: #6b6b6b; --text3: #999;
  --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.2);
  --blue: #4a9ede; --radius: 8px; --radius-lg: 12px;
  --modal-overlay: rgba(0,0,0,0.35);
  --btn-hover-bg: #d0d0ce; --btn-hover-color: #1a1a1a; --btn-primary-hover-bg: #404040;
  --lane-active: #0F6E56; --lane-waiting: #854F0B; --lane-someday: #3C3489; --lane-done: #5F5E5A;
  --tab-h: 56px; --topbar-h: 52px;
}
[data-dark] {
  --bg: #1e1e1e; --bg2: #141414; --bg3: #2a2a2a;
  --text: #e8e8e8; --text2: #9a9a9a; --text3: #666;
  --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.16);
  --modal-overlay: rgba(0,0,0,0.6);
  --btn-hover-bg: #555; --btn-hover-color: #e8e8e8; --btn-primary-hover-bg: #bbb;
  --lane-active: #2DC898; --lane-waiting: #F0A030; --lane-someday: #9B8FEE; --lane-done: #9A9A9A;
}
html, body { height: 100%; overflow: hidden; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg2); color: var(--text); display: flex; flex-direction: column; transition: background 0.2s, color 0.2s; }

/* ── Topbar ── */
.topbar { background: var(--bg); border-bottom: 0.5px solid var(--border); padding: 0 1rem; height: var(--topbar-h); display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-shrink: 0; }
.topbar-left { display: flex; align-items: center; gap: 8px; min-width: 0; }
.topbar-title-wrap { display: flex; align-items: center; gap: 5px; min-width: 0; }
.topbar-title { font-size: 18px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.topbar-rename-btn { background: none; border: none; cursor: pointer; padding: 2px; color: var(--text3); display: flex; align-items: center; opacity: 0.6; flex-shrink: 0; }
.topbar-rename-btn:hover { opacity: 1; color: var(--text2); }
.topbar-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.topbar-note { font-size: 11px; color: var(--text3); font-style: italic; white-space: nowrap; }

/* Icon buttons in topbar */
.icon-btn { background: none; border: none; cursor: pointer; padding: 6px; color: var(--text2); display: flex; align-items: center; border-radius: var(--radius); }
.icon-btn:hover { background: var(--bg3); }

/* ── Desktop toggle strip (hidden on mobile) ── */
.toggle-strip { display: flex; align-items: center; gap: 14px; }
.toggle-wrap { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--text2); cursor: pointer; user-select: none; white-space: nowrap; }
.toggle { position: relative; width: 32px; height: 18px; flex-shrink: 0; }
.toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
.toggle-track { position: absolute; inset: 0; background: var(--border2); border-radius: 9px; transition: background 0.2s; }
.toggle input:checked + .toggle-track { background: var(--blue); }
.toggle-thumb { position: absolute; top: 2px; left: 2px; width: 14px; height: 14px; background: white; border-radius: 50%; transition: transform 0.2s; pointer-events: none; }
.toggle input:checked ~ .toggle-thumb { transform: translateX(14px); }

/* ── Buttons ── */
.btn { background: transparent; border: 0.5px solid var(--border2); border-radius: var(--radius); padding: 6px 12px; font-size: 13px; cursor: pointer; color: var(--text); display: inline-flex; align-items: center; gap: 6px; }
.btn:hover { background: var(--btn-hover-bg); color: var(--btn-hover-color); }
.btn-primary { background: var(--text); color: var(--bg); border-color: transparent; }
.btn-primary:hover { background: var(--btn-primary-hover-bg); color: var(--bg); opacity: 1; }
.btn-sm { padding: 4px 8px; font-size: 12px; }
.btn-danger { color: #A32D2D; border-color: #F09595; background: transparent; }
.btn-danger:hover { background: #FCEBEB; }
.btn-full-width { width: 100%; justify-content: center; padding: 10px; font-size: 14px; }

/* ── Main content area ── */
.app-body { flex: 1; overflow: hidden; display: flex; flex-direction: column; }

/* ── Desktop kanban ── */
.desktop-main { flex: 1; overflow-y: auto; padding: 1.25rem; max-width: 1200px; margin: 0 auto; width: 100%; }
.view-header { display: flex; align-items: center; gap: 12px; margin-bottom: 1.25rem; flex-wrap: wrap; }
.view-header h2 { font-size: 18px; font-weight: 500; }
.breadcrumb { font-size: 16px; display: flex; align-items: center; gap: 6px; }
.breadcrumb-link { cursor: pointer; color: var(--blue); }
.breadcrumb-link:hover { text-decoration: underline; }
.breadcrumb-sep { color: var(--text3); }
.breadcrumb-current { color: var(--text); font-weight: 500; cursor: default; }
.commitment-detail { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 14px 16px; margin-bottom: 1.25rem; }
.commitment-detail-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
.commitment-detail-title { font-size: 16px; font-weight: 500; margin-bottom: 4px; }
.commitment-detail-notes { font-size: 13px; color: var(--text2); margin-bottom: 8px; }
.kanban { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; align-items: start; }
.today-kanban { display: grid; grid-template-columns: minmax(0, 480px); gap: 10px; }

/* ── Mobile swipeable lanes ── */
.mobile-main { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
.mobile-lane-scroller { flex: 1; display: flex; overflow-x: auto; scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
.mobile-lane-scroller::-webkit-scrollbar { display: none; }
.mobile-lane-panel { flex: 0 0 100%; width: 100%; scroll-snap-align: start; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
.mobile-lane-header { display: flex; align-items: center; justify-content: space-between; padding: 4px 0 8px; }
.mobile-lane-title { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; }
.mobile-lane-count { font-size: 12px; color: var(--text3); }
.mobile-lane-panel[data-lane="Active"] .mobile-lane-title { color: var(--lane-active); }
.mobile-lane-panel[data-lane="Waiting On"] .mobile-lane-title { color: var(--lane-waiting); }
.mobile-lane-panel[data-lane="Someday"] .mobile-lane-title { color: var(--lane-someday); }
.mobile-lane-panel[data-lane="Done"] .mobile-lane-title { color: var(--lane-done); }

/* ── Tab bar (mobile bottom nav) ── */
.tab-bar { height: var(--tab-h); background: var(--bg); border-top: 0.5px solid var(--border); display: flex; flex-shrink: 0; padding: 0 4px; padding-bottom: env(safe-area-inset-bottom); }
.tab-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; cursor: pointer; border: none; background: none; color: var(--text3); font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; padding: 6px 2px; border-radius: var(--radius); transition: color 0.15s; }
.tab-btn.active { color: var(--text); }
.tab-btn[data-lane="Active"].active { color: var(--lane-active); }
.tab-btn[data-lane="Waiting On"].active { color: var(--lane-waiting); }
.tab-btn[data-lane="Someday"].active { color: var(--lane-someday); }
.tab-btn[data-lane="Done"].active { color: var(--lane-done); }
.tab-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--text3); transition: background 0.15s; flex-shrink: 0; }
.tab-btn.active .tab-dot { background: currentColor; }
.tab-label { line-height: 1; }

/* ── Mobile FAB (floating add button) ── */
.fab { position: fixed; bottom: calc(var(--tab-h) + 12px + env(safe-area-inset-bottom)); right: 16px; width: 48px; height: 48px; background: var(--text); color: var(--bg); border: none; border-radius: 50%; font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 30; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }

/* ── Mobile breadcrumb back button ── */
.mobile-back { display: flex; align-items: center; gap: 6px; cursor: pointer; color: var(--blue); font-size: 15px; padding: 4px 0; }

/* ── Lane ── */
.lane { background: var(--bg3); border-radius: var(--radius-lg); padding: 10px; transition: background 0.15s; }
.lane.drag-over { background: #E6F1FB; outline: 1.5px dashed #378ADD; }
.lane-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.lane-title { font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; }
.lane-count { font-size: 11px; color: var(--text3); }
.lane[data-lane="Active"] .lane-title { color: var(--lane-active); }
.lane[data-lane="Waiting On"] .lane-title { color: var(--lane-waiting); }
.lane[data-lane="Someday"] .lane-title { color: var(--lane-someday); }
.lane[data-lane="Done"] .lane-title { color: var(--lane-done); }
.cards-area { min-height: 40px; }

/* ── Cards ── */
.card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 10px 12px; margin-bottom: 6px; user-select: none; transition: opacity 0.15s; position: relative; cursor: pointer; display: flex; align-items: flex-start; gap: 8px; }
.card.dragging { opacity: 0.4; }
.card.drag-insert-above { border-top: 2px solid #378ADD; }
.card.drag-insert-below { border-bottom: 2px solid #378ADD; }
.card:hover { border-color: var(--border2); }
.card-body { flex: 1; min-width: 0; }
.drag-handle { flex-shrink: 0; display: flex; align-items: center; padding: 2px 0 2px 4px; cursor: grab; color: var(--text3); opacity: 0.5; align-self: center; }
.drag-handle:hover { opacity: 1; color: var(--text2); }
.drag-handle:active { cursor: grabbing; }
.card-title { font-size: 13px; font-weight: 500; margin-bottom: 4px; }
.card-meta { font-size: 11px; color: var(--text2); display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }

/* Mobile card — slightly larger touch targets, no drag handle shown */
.mobile-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 11px 12px; cursor: pointer; }
.mobile-card:active { opacity: 0.7; }
.mobile-card-inner { display: flex; align-items: flex-start; gap: 8px; }
.mobile-card-body { flex: 1; min-width: 0; }
.mobile-card-title { font-size: 15px; font-weight: 500; margin-bottom: 5px; }
.mobile-card-meta { font-size: 12px; color: var(--text2); display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.mobile-card-controls { display: flex; flex-direction: column; align-items: center; gap: 2px; flex-shrink: 0; }
.mcc-row { display: flex; gap: 2px; }
.mcc-btn { width: 28px; height: 28px; border: 0.5px solid var(--border2); border-radius: 6px; background: var(--bg2); color: var(--text2); font-size: 13px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; -webkit-tap-highlight-color: transparent; }
.mcc-btn:active { background: var(--btn-hover-bg); color: var(--btn-hover-color); }
.mcc-btn[disabled] { opacity: 0.22; cursor: default; }

/* ── Badges ── */
.badge { display: inline-block; padding: 2px 7px; border-radius: 20px; font-size: 10px; font-weight: 500; }
.badge-Active { background: #E1F5EE; color: #0F6E56; }
.badge-WaitingOn { background: #FAEEDA; color: #854F0B; }
.badge-Someday { background: #EEEDFE; color: #3C3489; }
.badge-Done { background: #F1EFE8; color: #5F5E5A; }
.task-count { font-size: 11px; color: var(--text3); }
.completed-date { font-size: 11px; color: var(--text3); }
.empty { font-size: 12px; color: var(--text3); text-align: center; padding: 16px 0; }

/* ── Modal ── */
.modal-bg { position: fixed; inset: 0; background: var(--modal-overlay); display: flex; align-items: flex-start; justify-content: center; padding-top: 80px; z-index: 100; }
.modal { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; width: 100%; max-width: 420px; }
.modal h3 { font-size: 16px; font-weight: 500; margin-bottom: 1rem; }
.field { margin-bottom: 12px; }
.field label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 4px; }
.field input, .field select, .field textarea { width: 100%; font-size: 13px; padding: 7px 10px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--bg); color: var(--text); font-family: inherit; }
.field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px rgba(74,158,222,0.15); }
.field textarea { resize: vertical; min-height: 60px; }
.modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 1rem; }

/* Mobile modal — slides up from bottom */
@media (max-width: 768px) {
  .modal-bg { align-items: flex-end; padding: 0; }
  .modal { border-radius: var(--radius-lg) var(--radius-lg) 0 0; max-width: 100%; padding: 1.25rem; padding-bottom: calc(1.25rem + env(safe-area-inset-bottom)); border-bottom: none; }
  .field input, .field select, .field textarea { font-size: 16px; } /* prevent iOS zoom */
}

/* ── Settings sheet (mobile) ── */
.sheet-bg { position: fixed; inset: 0; background: var(--modal-overlay); z-index: 90; display: flex; align-items: flex-end; }
.sheet { background: var(--bg); border-radius: var(--radius-lg) var(--radius-lg) 0 0; padding: 1.25rem; padding-bottom: calc(1.25rem + env(safe-area-inset-bottom)); width: 100%; }
.sheet h3 { font-size: 15px; font-weight: 500; margin-bottom: 1rem; color: var(--text2); text-transform: uppercase; letter-spacing: 0.05em; font-size: 11px; }
.sheet-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 0.5px solid var(--border); }
.sheet-row:last-child { border-bottom: none; }
.sheet-label { font-size: 15px; color: var(--text); }

/* ── Mobile card flash feedback ── */
@keyframes card-flash-move { 0%{background:#D1FAE5} 60%{background:#D1FAE5} 100%{background:var(--bg)} }
@keyframes card-flash-reorder { 0%{background:#E0E7FF} 60%{background:#E0E7FF} 100%{background:var(--bg)} }
.mobile-card.flash-move { animation: card-flash-move 0.5s ease-out forwards; }
.mobile-card.flash-reorder { animation: card-flash-reorder 0.5s ease-out forwards; }

/* ── Debug bar ── */
.debug-bar { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg); border-top: 0.5px solid var(--border); padding: 8px 1.5rem; align-items: center; gap: 12px; z-index: 50; }

/* ── Responsive: show/hide desktop vs mobile ── */
.desktop-only { display: flex; }
.desktop-main.desktop-only { display: block; }
.mobile-only { display: none; }
@media (max-width: 768px) {
  .desktop-only { display: none !important; }
  .mobile-only { display: flex !important; }
  .fab { display: flex; }
}
@media (min-width: 769px) {
  .fab { display: none !important; }
  .tab-bar { display: none !important; }
  .mobile-main { display: none !important; }
}
</style>
</head>
<body>

<!-- Topbar -->
<div class="topbar">
  <div class="topbar-left">
    <!-- Mobile: back button (shown inside app-body on mobile) -->
    <div class="topbar-title-wrap">
      <span class="topbar-title" id="topbar-title-text">Work Tracker</span>
      <button class="topbar-rename-btn" onclick="openRenameDialog()" title="Rename">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M11.013 1.427a1.75 1.75 0 0 1 2.474 0l1.086 1.086a1.75 1.75 0 0 1 0 2.474l-8.61 8.61c-.21.21-.47.364-.756.445l-3.251.93a.75.75 0 0 1-.927-.928l.929-3.25c.081-.286.235-.547.445-.758l8.61-8.61zm1.414 1.06a.25.25 0 0 0-.354 0L10.811 3.75l1.439 1.44 1.263-1.263a.25.25 0 0 0 0-.354l-1.086-1.086zM11.189 6.25 9.75 4.81 3.22 11.34a.25.25 0 0 0-.064.108l-.558 1.953 1.953-.558a.25.25 0 0 0 .108-.064L11.19 6.25z"/></svg>
      </button>
    </div>
    <span class="topbar-note desktop-only">Standalone — saved in browser</span>
  </div>
  <div class="topbar-right">
    <!-- Desktop toggles -->
    <div class="toggle-strip desktop-only">
      <label class="toggle-wrap">
        <span>Today</span>
        <span class="toggle"><input type="checkbox" id="today-toggle" onchange="renderApp()"><span class="toggle-track"></span><span class="toggle-thumb"></span></span>
      </label>
      <label class="toggle-wrap">
        <span>Dark mode</span>
        <span class="toggle"><input type="checkbox" id="dark-mode-toggle" onchange="toggleDark(this.checked)"><span class="toggle-track"></span><span class="toggle-thumb"></span></span>
      </label>
      <label class="toggle-wrap">
        <span>Hide old done</span>
        <span class="toggle"><input type="checkbox" id="hide-old-toggle" onchange="renderApp()"><span class="toggle-track"></span><span class="toggle-thumb"></span></span>
      </label>
    </div>
    <!-- Mobile settings button -->
    <button class="icon-btn mobile-only" onclick="openSettingsSheet()" title="Settings">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </div>
</div>

<!-- App body -->
<div class="app-body">
  <!-- Desktop view -->
  <div class="desktop-main desktop-only" id="kanban-root"></div>

  <!-- Mobile view -->
  <div class="mobile-main mobile-only">
    <div id="mobile-header" style="padding:10px 12px 0;flex-shrink:0;"></div>
    <div class="mobile-lane-scroller" id="mobile-scroller">
      <!-- populated by JS -->
    </div>
  </div>
</div>

<!-- Mobile tab bar -->
<div class="tab-bar mobile-only" id="tab-bar"></div>

<!-- Mobile FAB -->
<button class="fab mobile-only" id="fab" onclick="openMobileFab()">+</button>

<!-- Modal / sheet container -->
<div id="modal-container"></div>

<!-- Debug bar -->
<div class="debug-bar" id="debug-bar">
  <span style="font-size:11px;color:var(--text3);font-family:monospace;">debug</span>
  <button class="btn btn-sm" onclick="debugDownload()">Download JSON</button>
  <button class="btn btn-sm" onclick="document.getElementById('debug-upload-input').click()">Upload JSON</button>
  <input type="file" id="debug-upload-input" accept=".json,application/json" style="display:none" onchange="debugUpload(this)">
</div>

<script>
const STORAGE_KEY = 'work_tracker_data';
const LANES = ['Active', 'Waiting On', 'Someday', 'Done'];
const BADGE_KEY = { 'Active':'Active', 'Waiting On':'WaitingOn', 'Someday':'Someday', 'Done':'Done' };
const OLD_DONE_DAYS = 7;
const TODAY_LIMIT = 3;

let appState = { view:'commitments', commitmentId:null, commitments:[], tasks:[], title:'Work Tracker' };
let modalState = null;
let dragState = null;
let didDrag = false;
let dragFromHandle = false;
let activeLaneIndex = 0; // mobile tab index

// ── Responsive ────────────────────────────────────────────────────────────────
const isMobile = () => window.innerWidth <= 768;

// ── Persistence ───────────────────────────────────────────────────────────────
function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ commitments:appState.commitments, tasks:appState.tasks, title:appState.title })); }
  catch(e) { console.warn('Could not save:', e); }
}
function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) { const d = JSON.parse(raw); appState.commitments=d.commitments||[]; appState.tasks=d.tasks||[]; appState.title=d.title||'Work Tracker'; }
  } catch(e) { appState.commitments=[]; appState.tasks=[]; appState.title='Work Tracker'; }
}
function renderTitle() {
  const el = document.getElementById('topbar-title-text');
  if (el) el.textContent = appState.title;
  document.title = appState.title;
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function uid() { return 'id'+Math.random().toString(36).slice(2); }
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function badgeHTML(lane) { return `<span class="badge badge-${BADGE_KEY[lane]||'Done'}">${lane}</span>`; }
function tasksFor(cid) { return appState.tasks.filter(t=>t.commitmentId===cid); }
function today() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function isOldDone(item) {
  if (item.lane!=='Done'||!item.completedDate) return false;
  return (Date.now()-new Date(item.completedDate).getTime()) > OLD_DONE_DAYS*86400000;
}
function hideOldEnabled() { return document.getElementById('hide-old-toggle')?.checked; }
function todayEnabled() { return document.getElementById('today-toggle')?.checked; }
function shouldShow(item) { return !hideOldEnabled()||!isOldDone(item); }
function laneItems(items, lane) {
  const inLane = items.filter(i=>i.lane===lane);
  if (lane==='Done') return inLane.sort((a,b)=>{
    if (!a.completedDate&&!b.completedDate) return (a.sortOrder||0)-(b.sortOrder||0);
    if (!a.completedDate) return 1; if (!b.completedDate) return -1;
    return new Date(b.completedDate)-new Date(a.completedDate);
  });
  return inLane.sort((a,b)=>(a.sortOrder||0)-(b.sortOrder||0));
}
function commitmentProgress(cid) {
  const ts=tasksFor(cid);
  if (!ts.length) return 'no tasks';
  return `${ts.filter(t=>t.lane==='Done').length}/${ts.length} done`;
}
function formatDate(d) {
  if (!d) return '';
  return new Date(d+'T00:00:00').toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'});
}
function normalizeSortOrders() {
  LANES.forEach(lane=>{
    [appState.commitments,appState.tasks].forEach(col=>{
      col.filter(i=>i.lane===lane).sort((a,b)=>(a.sortOrder||0)-(b.sortOrder||0)).forEach((item,idx)=>{item.sortOrder=(idx+1)*1000;});
    });
  });
}

const DRAG_HANDLE_SVG = `<svg width="12" height="16" viewBox="0 0 12 16" fill="currentColor"><circle cx="3.5" cy="3" r="1.5"/><circle cx="8.5" cy="3" r="1.5"/><circle cx="3.5" cy="8" r="1.5"/><circle cx="8.5" cy="8" r="1.5"/><circle cx="3.5" cy="13" r="1.5"/><circle cx="8.5" cy="13" r="1.5"/></svg>`;

// ── Desktop render ─────────────────────────────────────────────────────────────
function renderKanban(items, cardFn) {
  if (todayEnabled()) {
    const activeItems = laneItems(items,'Active');
    const top = activeItems.slice(0,TODAY_LIMIT);
    const remaining = activeItems.length - top.length;
    const cards = top.map(i=>cardFn(i)).join('')||'<div class="empty">—</div>';
    const moreNote = remaining>0?`<div class="empty" style="font-style:italic">+${remaining} more item${remaining>1?'s':''}</div>`:'';
    return `<div class="today-kanban"><div class="lane" data-lane="Active">
      <div class="lane-header"><span class="lane-title">Active</span><span class="lane-count">${activeItems.length}</span></div>
      <div class="cards-area" data-lane="Active">${cards}${moreNote}</div>
    </div></div>`;
  }
  return `<div class="kanban">${LANES.map(lane=>{
    const its=laneItems(items,lane), visible=its.filter(shouldShow), hidden=its.length-visible.length;
    const cards=visible.map(i=>cardFn(i)).join('');
    const hiddenNote=hidden>0?`<div class="empty" style="font-style:italic">${hidden} older item${hidden>1?'s':''} hidden</div>`:'';
    return `<div class="lane" data-lane="${lane}">
      <div class="lane-header"><span class="lane-title">${lane}</span><span class="lane-count">${its.length}</span></div>
      <div class="cards-area" data-lane="${lane}">${cards||(!hiddenNote?'<div class="empty">—</div>':'')}${hiddenNote}</div>
    </div>`;
  }).join('')}</div>`;
}

function commitmentCard(c) {
  const dateStr = c.completedDate?`<span class="completed-date">Done ${formatDate(c.completedDate)}</span>`:'';
  return `<div class="card" draggable="true" data-id="${c.id}" data-type="commitment">
    <div class="card-body"><div class="card-title">${esc(c.title)}</div>
    <div class="card-meta">${badgeHTML(c.lane)}<span class="task-count">${commitmentProgress(c.id)}</span>${dateStr}</div></div>
    <div class="drag-handle" title="Drag to reorder">${DRAG_HANDLE_SVG}</div>
  </div>`;
}
function taskCard(t) {
  const dateStr = t.completedDate?`<span class="completed-date">Done ${formatDate(t.completedDate)}</span>`:'';
  return `<div class="card" draggable="true" data-id="${t.id}" data-type="task">
    <div class="card-body"><div class="card-title">${esc(t.title)}</div>
    <div class="card-meta">${badgeHTML(t.lane)}${dateStr}</div></div>
    <div class="drag-handle" title="Drag to reorder">${DRAG_HANDLE_SVG}</div>

}

// ── Mobile render ─────────────────────────────────────────────────────────────
function renderMobile() {
  const scroller = document.getElementById('mobile-scroller');
  const header = document.getElementById('mobile-header');

  // Determine items + card renderer based on view
  let items, cardFn, isTaskView = false;

  if (appState.view==='tasks') {
    commitment = appState.commitments.find(x=>x.id===appState.commitmentId);
    if (!commitment) { appState.view='commitments'; renderMobile(); return; }

    cardFn = mobileTaskCard;
    isTaskView = true;
  } else {
    items = appState.commitments;
    cardFn = mobileCommitmentCard;
  }

  // Header
  if (isTaskView) {
    header.innerHTML = `
      <div class="mobile-back" onclick="goHome()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>

      <div style="margin-top:8px;padding-bottom:10px;border-bottom:0.5px solid var(--border)">
        <div style="font-size:16px;font-weight:500;margin-bottom:3px">${esc(commitment.title)}</div>
        ${commitment.notes?`<div style="font-size:13px;color:var(--text2);margin-bottom:5px">${esc(commitment.notes)}</div>`:''}
        <div style="display:flex;align-items:center;gap:8px">${badgeHTML(commitment.lane)}<button class="btn btn-sm" onclick="openModal('commitment','${commitment.id}')">Edit</button></div>
      </div>`;
  } else {
    header.innerHTML = '';
  }

  // Build lane panels
  const lanesHtml = LANES.map((lane, idx) => {
    const laneItemsList = laneItems(items, lane).filter(shouldShow);
    const totalInLane = laneItems(items, lane).length;
    const hiddenCount = totalInLane - laneItemsList.length;
    const cards = laneItemsList.map(i=>cardFn(i)).join('') ||
      `<div class="empty">Nothing here</div>`;
    const hiddenNote = hiddenCount>0?`<div class="empty" style="font-style:italic">${hiddenCount} older item${hiddenCount>1?'s':''} hidden</div>`:'';
    return `<div class="mobile-lane-panel" data-lane="${lane}" data-idx="${idx}">
      <div class="mobile-lane-header">
        <span class="mobile-lane-title">${lane}</span>
        <span class="mobile-lane-count">${totalInLane}</span>
      </div>
      ${cards}${hiddenNote}
    </div>`;
  }).join('');
  scroller.innerHTML = lanesHtml;

  // Tab bar
  tabBar.innerHTML = LANES.map((lane, idx) => {
    const count = laneItems(items, lane).length;
    const isActive = idx === activeLaneIndex;
    return `<button class="tab-btn${isActive?' active':''}" data-lane="${lane}" data-idx="${idx}" onclick="scrollToLane(${idx})">
      <div class="tab-dot"></div>
      <span class="tab-label">${lane==='Waiting On'?'Waiting':lane}</span>
    </button>`;
  }).join('');

  // Scroll to active lane without animation on initial render
  requestAnimationFrame(()=>{
    const panel = scroller.children[activeLaneIndex];
    if (panel) panel.scrollIntoView({behavior:'instant',inline:'start'});
  });

  // Track swipe to update active tab
  scroller.onscroll = () => {
    const idx = Math.round(scroller.scrollLeft / scroller.clientWidth);
    if (idx !== activeLaneIndex) { activeLaneIndex = idx; updateTabBar(); }
  };

  // Wire up card body clicks (controls handle their own clicks via stopPropagation)
  scroller.querySelectorAll('[data-mobile-id]').forEach(card=>{
    card.querySelector('.mobile-card-body')?.addEventListener('click', ()=>{
      const id = card.dataset.mobileId;
      const type = card.dataset.mobileType;
      if (type==='commitment') { appState.view='tasks'; appState.commitmentId=id; activeLaneIndex=0; renderMobile(); }
      else openModal('task', id);
    });
  });

  renderModal();
}

function updateTabBar() {
  document.querySelectorAll('.tab-btn').forEach((btn,i)=>{
    btn.classList.toggle('active', i===activeLaneIndex);
  });
}

function scrollToLane(idx) {
  activeLaneIndex = idx;
  const scroller = document.getElementById('mobile-scroller');
  const panel = scroller.children[idx];
  if (panel) panel.scrollIntoView({behavior:'smooth',inline:'start'});
  updateTabBar();
}

function mobileCardControls(item, type, items) {
  const laneIdx = LANES.indexOf(item.lane);
  const peers = laneItems(items, item.lane);
  const pos = peers.findIndex(x => x.id === item.id);
  const canLeft  = laneIdx > 0;
  const canRight = laneIdx < LANES.length - 1;
  const canUp    = pos > 0;
  const canDown  = pos < peers.length - 1;
  const id = item.id;
  return `<div class="mobile-card-controls" onclick="event.stopPropagation()">
    <div class="mcc-row">
      <button class="mcc-btn" title="Move left" ${canLeft?'':'disabled'} onclick="mobileMoveLane('${id}','${type}',-1)">←</button>
      <button class="mcc-btn" title="Move right" ${canRight?'':'disabled'} onclick="mobileMoveLane('${id}','${type}',1)">→</button>
    </div>
    <div class="mcc-row">
      <button class="mcc-btn" title="Move up" ${canUp?'':'disabled'} onclick="mobileMoveOrder('${id}','${type}',-1)">↑</button>
      <button class="mcc-btn" title="Move down" ${canDown?'':'disabled'} onclick="mobileMoveOrder('${id}','${type}',1)">↓</button>
    </div>
  </div>`;
}

function mobileCommitmentCard(c) {
  const dateStr = c.completedDate?`<span class="completed-date">Done ${formatDate(c.completedDate)}</span>`:'';
  return `<div class="mobile-card" data-mobile-id="${c.id}" data-mobile-type="commitment">
    <div class="mobile-card-inner">
      <div class="mobile-card-body">
        <div class="mobile-card-title">${esc(c.title)}</div>
        <div class="mobile-card-meta">${badgeHTML(c.lane)}<span class="task-count">${commitmentProgress(c.id)}</span>${dateStr}</div>
      </div>
      ${mobileCardControls(c, 'commitment', appState.commitments)}
    </div>
  </div>`;
}

function mobileTaskCard(t) {
  const dateStr = t.completedDate?`<span class="completed-date">Done ${formatDate(t.completedDate)}</span>`:'';
  const items = tasksFor(t.commitmentId);
  return `<div class="mobile-card" data-mobile-id="${t.id}" data-mobile-type="task">
    <div class="mobile-card-inner">
      <div class="mobile-card-body">
        <div class="mobile-card-title">${esc(t.title)}</div>
        <div class="mobile-card-meta">${badgeHTML(t.lane)}${dateStr}</div>
      </div>
      ${mobileCardControls(t, 'task', items)}
    </div>
  </div>`;

function mobileMoveLane(id, type, dir) {
  const col = type==='commitment' ? appState.commitments : appState.tasks;
  const item = col.find(x => x.id === id);
  if (!item) return;
  const newLaneIdx = LANES.indexOf(item.lane) + dir;
  if (newLaneIdx < 0 || newLaneIdx >= LANES.length) return;
  const newLane = LANES[newLaneIdx];
  if (newLane === 'Done') item.completedDate = today();
  else if (item.lane === 'Done') item.completedDate = null;
  item.lane = newLane;
  const maxOrder = Math.max(0, ...laneItems(col, newLane).map(x => x.sortOrder||0));
  item.sortOrder = maxOrder + 1000;
  activeLaneIndex = newLaneIdx;
  save(); renderMobile();
  // Flash the card green to confirm the move
  requestAnimationFrame(() => {
    const el = document.querySelector(`[data-mobile-id="${id}"]`);
    if (el) { el.classList.remove('flash-move','flash-reorder'); void el.offsetWidth; el.classList.add('flash-move'); }
  });
}

function mobileMoveOrder(id, type, dir) {
  const col = type==='commitment' ? appState.commitments : appState.tasks;
  const item = col.find(x => x.id === id);
  if (!item) return;
  const peers = laneItems(col, item.lane);
  const idx = peers.findIndex(x => x.id === id);
  const swapIdx = idx + dir;
  if (swapIdx < 0 || swapIdx >= peers.length) return;
  const tmp = peers[idx].sortOrder;
  peers[idx].sortOrder = peers[swapIdx].sortOrder;
  peers[swapIdx].sortOrder = tmp;
  save(); renderMobile();
  // Flash the card blue to confirm the reorder
  requestAnimationFrame(() => {
    const el = document.querySelector(`[data-mobile-id="${id}"]`);
    if (el) { el.classList.remove('flash-move','flash-reorder'); void el.offsetWidth; el.classList.add('flash-reorder'); }
  });
}

function openModal(type, editId) { modalState={type,editId}; renderModal(); }
function closeModal() { modalState=null; renderModal(); }

function renderModal() {
  const el = document.getElementById('modal-container');
  if (!modalState) { el.innerHTML=''; return; }
  const {type,editId}=modalState, isTask=type==='task';
  const item = editId?(isTask?appState.tasks.find(t=>t.id===editId):appState.commitments.find(c=>c.id===editId)):null;
  const title = item?(isTask?'Edit task':'Edit commitment'):(isTask?'New task':'New commitment');
  const laneOpts = LANES.map(l=>`<option value="${l}"${item&&item.lane===l?' selected':''}>${l}</option>`).join('');
  const commitmentOpts = appState.commitments.map(c=>`<option value="${c.id}"${(item&&item.commitmentId===c.id)||(appState.commitmentId===c.id&&!item)?' selected':''}>${esc(c.title)}</option>`).join('');
  const noteField = !isTask?`<div class="field"><label>Notes</label><textarea id="f-notes">${esc(item&&item.notes||'')}</textarea></div>`:'';
  const commitmentField = isTask?`<div class="field"><label>Commitment</label><select id="f-commitment">${commitmentOpts}</select></div>`:'';
  const deleteBtn = item?`<button class="btn btn-sm btn-danger" onclick="deleteItem('${editId}','${type}')">Delete</button>`:'';
  el.innerHTML = `<div class="modal-bg" onclick="if(event.target===this)closeModal()">
    <div class="modal" id="the-modal">
      <h3>${title}</h3>
      <div class="field"><label>Title</label><input id="f-title" value="${esc(item&&item.title||'')}"></div>
      ${commitmentField}${noteField}
      <div class="field"><label>Status</label><select id="f-lane">${laneOpts}</select></div>
      <div class="modal-actions">${deleteBtn}
        <button class="btn btn-sm" onclick="closeModal()">Cancel</button>
        <button class="btn btn-sm btn-primary" onclick="saveItem('${type}','${editId||''}')">Save</button>
      </div>
    </div>
  </div>`;
  document.getElementById('f-title').focus();
  document.getElementById('the-modal').addEventListener('keydown', e=>{
    if (e.key==='Escape'){e.preventDefault();closeModal();}
    if (e.key==='Enter'&&e.target.tagName!=='TEXTAREA'){e.preventDefault();saveItem(type,editId||'');}
  });
}

function saveItem(type, editId) {
  const titleEl=document.getElementById('f-title');
  const title=titleEl.value.trim();
  if (!title){titleEl.focus();return;}
  const newLane=document.getElementById('f-lane').value;
  if (type==='commitment') {
    const notes=document.getElementById('f-notes').value.trim();
    if (editId) {
      const c=appState.commitments.find(x=>x.id===editId);
      if (c){if(newLane==='Done'&&c.lane!=='Done')c.completedDate=today();else if(newLane!=='Done'&&c.lane==='Done')c.completedDate=null;c.title=title;c.notes=notes;c.lane=newLane;}
    } else {
      const maxOrder=Math.max(0,...appState.commitments.filter(x=>x.lane===newLane).map(x=>x.sortOrder||0));
      appState.commitments.push({id:uid(),title,lane:newLane,notes,sortOrder:maxOrder+1000,completedDate:newLane==='Done'?today():null});
    }
  } else {
    const commitmentId=document.getElementById('f-commitment').value;
    if (editId) {
      const t=appState.tasks.find(x=>x.id===editId);
      if (t){if(newLane==='Done'&&t.lane!=='Done')t.completedDate=today();else if(newLane!=='Done'&&t.lane==='Done')t.completedDate=null;t.title=title;t.lane=newLane;t.commitmentId=commitmentId;}
    } else {
      const maxOrder=Math.max(0,...appState.tasks.filter(x=>x.lane===newLane&&x.commitmentId===commitmentId).map(x=>x.sortOrder||0));
      appState.tasks.push({id:uid(),commitmentId,title,lane:newLane,sortOrder:maxOrder+1000,completedDate:newLane==='Done'?today():null});
    }
  }
  save(); closeModal(); renderApp();
}

function deleteItem(id, type) {
  if (type==='commitment'){appState.commitments=appState.commitments.filter(c=>c.id!==id);appState.tasks=appState.tasks.filter(t=>t.commitmentId!==id);appState.view='commitments';appState.commitmentId=null;}
  else appState.tasks=appState.tasks.filter(t=>t.id!==id);
  save(); closeModal(); renderApp();
}

// ── Drag & Drop (desktop only) ────────────────────────────────────────────────
function clearInsertIndicators(){document.querySelectorAll('.card').forEach(c=>c.classList.remove('drag-insert-above','drag-insert-below'));}
function clearDragState(){
  document.querySelectorAll('.card.dragging').forEach(c=>c.classList.remove('dragging'));
  document.querySelectorAll('.lane').forEach(l=>l.classList.remove('drag-over'));
  clearInsertIndicators(); dragState=null; dragFromHandle=false; didDrag=false;
}
document.addEventListener('dragend',()=>{clearDragState();});

function setupDrag() {
  if (isMobile()) return; // drag-to-reorder is desktop only
  document.querySelectorAll('.card[draggable]').forEach(card=>{
    const handle=card.querySelector('.drag-handle');
    if(handle) handle.addEventListener('mousedown',()=>{dragFromHandle=true;});
    card.addEventListener('dragstart',e=>{
      if(!dragFromHandle){e.preventDefault();return;}
      didDrag=false; dragState={id:card.dataset.id,type:card.dataset.type};
      setTimeout(()=>card.classList.add('dragging'),0);
      e.dataTransfer.effectAllowed='move'; dragFromHandle=false;
    });
    card.addEventListener('dragend',()=>{clearDragState();});
    card.addEventListener('dragover',e=>{
      e.preventDefault();e.stopPropagation();if(!dragState)return;
      clearInsertIndicators();
      const rect=card.getBoundingClientRect();
      if(e.clientY<rect.top+rect.height/2)card.classList.add('drag-insert-above');
      else card.classList.add('drag-insert-below');
    });
    card.addEventListener('drop',e=>{
      e.preventDefault();e.stopPropagation();
      if(!dragState||dragState.id===card.dataset.id){clearDragState();return;}
      didDrag=true;
      const insertAbove=card.classList.contains('drag-insert-above');
      const saved={...dragState}; clearDragState();
      const col=saved.type==='commitment'?appState.commitments:appState.tasks;
      const dragged=col.find(x=>x.id===saved.id), target=col.find(x=>x.id===card.dataset.id);
      if(!dragged||!target)return;
      const tl=target.lane;
      if(dragged.lane!==tl){if(tl==='Done')dragged.completedDate=today();else if(dragged.lane==='Done')dragged.completedDate=null;dragged.lane=tl;}
      const peers=laneItems(col,tl), idx=peers.findIndex(x=>x.id===target.id), to=target.sortOrder||0;
      if(insertAbove){const prev=peers[idx-1];dragged.sortOrder=prev?((prev.sortOrder||0)+to)/2:to-500;}
      else{const next=peers[idx+1];dragged.sortOrder=next?(to+(next.sortOrder||0))/2:to+500;}
      save(); renderApp();
    });
    card.addEventListener('click',e=>{
      if(didDrag)return;
      if(e.target.closest('.drag-handle'))return;
      if(card.dataset.type==='commitment'){appState.view='tasks';appState.commitmentId=card.dataset.id;renderApp();}
      else openModal('task',card.dataset.id);
    });
  });
  document.querySelectorAll('.cards-area').forEach(area=>{
    const lane=area.closest('.lane');
    area.addEventListener('dragover',e=>{e.preventDefault();e.dataTransfer.dropEffect='move';document.querySelectorAll('.lane').forEach(l=>l.classList.remove('drag-over'));lane.classList.add('drag-over');});
    area.addEventListener('dragleave',e=>{if(!area.contains(e.relatedTarget))lane.classList.remove('drag-over');});
    area.addEventListener('drop',e=>{
      e.preventDefault(); lane.classList.remove('drag-over'); clearInsertIndicators();
      if(!dragState)return;
      if(e.target!==area&&e.target.closest&&e.target.closest('.card'))return;
      didDrag=true;
      const nl=area.dataset.lane, saved={...dragState}; clearDragState();
      const col=saved.type==='commitment'?appState.commitments:appState.tasks;
      const item=col.find(x=>x.id===saved.id);
      if(!item)return;
      if(item.lane!==nl){if(nl==='Done')item.completedDate=today();else if(item.lane==='Done')item.completedDate=null;item.lane=nl;}
      const maxOrder=Math.max(0,...laneItems(col,nl).map(x=>x.sortOrder||0));
      item.sortOrder=maxOrder+1000; save(); renderApp();
    });
  });
}

// ── Dark mode ─────────────────────────────────────────────────────────────────
function toggleDark(on){
  if(on)document.documentElement.setAttribute('data-dark','');
  else document.documentElement.removeAttribute('data-dark');
  try{localStorage.setItem('wt_dark',on?'1':'0');}catch(e){}
}

// ── Debug ─────────────────────────────────────────────────────────────────────
function debugDownload(){
  const raw=localStorage.getItem(STORAGE_KEY)||'{"commitments":[],"tasks":[]}';
  const blob=new Blob([JSON.stringify(JSON.parse(raw),null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download=`work-tracker-${today()}.json`; a.click(); URL.revokeObjectURL(a.href);
}
function debugUpload(input){
  const file=input.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(!Array.isArray(data.commitments)||!Array.isArray(data.tasks))throw new Error('Invalid structure');
      appState.commitments=data.commitments; appState.tasks=data.tasks;
      if(data.title)appState.title=data.title;
      normalizeSortOrders(); save(); renderTitle(); renderApp(); input.value='';
    }catch(err){alert('Upload failed: '+err.message);}
  };
  reader.readAsText(file);
}

// ── PWA service worker ────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  const SW_SRC = `
const CACHE='wt-v1';
const ASSETS=['./'];
self.addEventListener('install',e=>e.waitUntil(caches.open(CACHE).then(c=>c.addAll(ASSETS))));
self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request))));
`;
  const blob = new Blob([SW_SRC], {type:'text/javascript'});
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(()=>{});
}

// ── Resize handler ────────────────────────────────────────────────────────────
let lastMobile = isMobile();
window.addEventListener('resize', ()=>{
  const nowMobile = isMobile();
  if (nowMobile !== lastMobile) { lastMobile = nowMobile; renderApp(); }
});

// ── Boot ──────────────────────────────────────────────────────────────────────
load(); normalizeSortOrders(); save(); renderTitle();
try {
  if(localStorage.getItem('wt_dark')==='1'){
    document.documentElement.setAttribute('data-dark','');
    const tog=document.getElementById('dark-mode-toggle'); if(tog)tog.checked=true;
  }
}catch(e){}
if(new URLSearchParams(window.location.search).get('debug')==='1'){
  document.getElementById('debug-bar').style.display='flex';
}
renderApp();
</script>
